version: "3"

# Environment shared by every task. `.env` and `.dev.env` (when present) layer on top.
env:
  DEFAULT_GROUP: Default
  PRODUCTION: false
  API_PORT: 8080
  API_DOCS: True
  TOKEN_TIME: 256 # hours
  # mailpit SMTP — run `task dev:services:start` to bring mailpit up
  SMTP_HOST: localhost
  SMTP_PORT: 1025
  SMTP_FROM_NAME: MarvinDev
  SMTP_FROM_EMAIL: marvin@example.com
  SMTP_AUTH_STRATEGY: NONE
  BASE_URL: http://localhost:3000
  LANG: en-US
  LOG_LEVEL: DEBUG

dotenv:
  - .env
  - .dev.env

vars:
  IMAGE: marvin

tasks:
  default:
    desc: list all available tasks
    cmds:
      - task --list
    silent: true

  dev:clean:
    desc: remove local dev data (sqlite db, log, secret)
    cmds:
      - rm -rf src/dev/data/marvin*.db
      - rm -rf src/dev/data/marvin.log
      - rm -rf src/dev/data/.secret

  dev:generate:
    desc: run code generators
    cmds:
      - uv run src/dev/code_generation/main.py
      - task: py:format

  # dev:reset-and-seed:
  #   desc: reset the dev environment and seed Mash & Burn Co. demo data
  #   cmds:
  #     - echo "Stopping Marvin service..."
  #     - pkill -f "marvin-server|uvicorn.*marvin" || echo "No service running"
  #     - sleep 2
  #     - echo "Cleaning development environment..."
  #     - task: dev:clean
  #     - echo "Starting Marvin backend..."
  #     - task py &
  #     - sleep 5
  #     - echo "Seeding demo data..."
  #     - uv run scripts/seed_mashandburnco.py
  #     - echo "✅ Reset complete! Marvin running with fresh data."

  dev:services:start:
    desc: start dev support services (postgres, mailpit, …)
    cmds:
      - docker compose -f docker/docker-compose.dev.yml up -d

  dev:services:stop:
    desc: stop dev support services
    cmds:
      - docker compose -f docker/docker-compose.dev.yml down

  docker:build:
    desc: 'build the production image (override tag with TAG=, default "latest")'
    cmds:
      - docker build -f docker/Dockerfile --target production -t {{.IMAGE}}:{{.TAG | default "latest"}} .

  docker:logs:
    desc: tail production stack logs
    cmds:
      - docker compose -f docker/docker-compose.yml logs -f app

  docker:prod:
    desc: build and run the full production stack via compose
    dir: docker
    cmds:
      - docker compose -f docker-compose.yml -p marvin up -d --build

  docs:
    desc: serve the documentation site
    dir: docs
    cmds:
      - uv run python -m mkdocs serve

  docs:gen:
    desc: generate the OpenAPI documentation
    cmds:
      - uv run src/dev/code_generation/gen_docs_api.py

  frontend:
    desc: run the Astro frontend dev server
    dir: frontend
    cmds:
      - npm run dev

  frontend:build:
    desc: build the Astro frontend
    dir: frontend
    cmds:
      - npm run build

  frontend:check:
    desc: type-check the Astro frontend
    dir: frontend
    cmds:
      - npm run check

  frontend:format:
    desc: format the frontend with Biome (writes changes)
    dir: frontend
    cmds:
      - npm run format

  # NOTE: Astro is configured output:"server" (node adapter), so this emits a server
  # build into frontend/dist — not a purely static site. Same output as frontend:build
  # without the preceding `astro check`.
  frontend:generate:
    desc: generate the built frontend in frontend/dist
    dir: frontend
    cmds:
      - npx astro build

  # NOTE: the frontend has no linter or test runner yet (no eslint/prettier, no vitest/jest,
  # and no `lint`/`test` scripts in package.json). These two tasks won't run until that
  # tooling and the matching npm scripts are added.
  frontend:lint:
    desc: run the frontend linter
    dir: frontend
    cmds:
      - npm run lint

  frontend:test:
    desc: run the frontend tests
    dir: frontend
    cmds:
      - npm run test

  py:
    desc: run the backend server
    cmds:
      - uv run src/marvin/app.py

  py:check:
    desc: run all python formatters, linters, type checks and tests
    deps:
      - py:format
      - py:lint
      - py:mypy
      - py:test

  py:coverage:
    desc: run tests with coverage and open the HTML report
    env:
      # Default to SQLite so the .env loaded above can't aim a schema-dropping test run at a real
      # Postgres database. An explicit `DB_ENGINE=postgres task py:coverage` still wins — the OS
      # environment takes precedence over a task's env.
      DB_ENGINE: sqlite
    cmds:
      - uv run pytest
      - uv run coverage report -m
      - uv run coverage lcov
      - uv run coverage html
      - open htmlcov/index.html

  py:format:
    desc: format python code
    cmds:
      - uv run ruff format src/marvin

  py:lint:
    desc: lint python code
    cmds:
      - uv run ruff check src/marvin

  py:migrate:
    desc: 'generate a new migration, e.g. task py:migrate -- "add new column"'
    cmds:
      - uv run alembic --config src/marvin/alembic.ini revision --autogenerate -m "{{ .CLI_ARGS }}"
      - task: py:format

  py:migrate:apply:
    desc: apply pending migrations (after reviewing the generated file)
    cmds:
      - uv run alembic --config src/marvin/alembic.ini upgrade head

  py:migrate:pending:
    desc: show migrations not yet applied to the database
    cmds:
      - uv run alembic --config src/marvin/alembic.ini history -r current:head

  py:mypy:
    desc: type-check python code
    cmds:
      - uv run mypy src/marvin

  py:postgres:
    desc: run the backend server against containerized postgres
    # Task-level env overrides the top-level `env` block (and .env) for this task only.
    env:
      DB_ENGINE: postgres
      POSTGRES_USER: default
      POSTGRES_PASSWORD: default
      POSTGRES_SERVER: 127.0.0.1
      POSTGRES_PORT: 5434
      POSTGRES_DB: marvin
    cmds:
      - uv run src/marvin/app.py

  py:server:
    desc: run a standalone server on :8000 for webhook tests
    cmds:
      - uv run scripts/server.py 8000 &

  py:test:
    desc: run python tests (args after '--')
    env:
      # Default to SQLite so the .env loaded above can't aim a schema-dropping test run at a real
      # Postgres database. An explicit `DB_ENGINE=postgres task py:test` still wins — the OS
      # environment takes precedence over a task's env.
      DB_ENGINE: sqlite
    cmds:
      - uv run pytest {{ .CLI_ARGS }}

  setup:
    desc: install all backend + frontend dependencies
    deps:
      - setup:py
      - setup:frontend

  setup:frontend:
    desc: install Astro frontend dependencies
    dir: frontend
    run: once
    cmds:
      - npm install
    sources:
      - package.json
      - package-lock.json

  setup:py:
    desc: install python dependencies and git hooks
    run: once
    cmds:
      - uv sync --group dev --group postgres
      - uv run pre-commit install
    sources:
      - uv.lock
      - pyproject.toml
      - .pre-commit-config.yaml
