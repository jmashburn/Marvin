# Staging environment overrides
# Usage: helm upgrade --install marvin ./marvin-chart -f values-staging.yaml

# Use more replicas for staging
replicaCount: 2

# Pull policy for staging (always pull to get latest)
image:
  pullPolicy: Always

# Staging-specific configuration
config:
  production: false  # Still in testing mode
  allowSignup: false  # Restrict signups
  logLevel: INFO  # Less verbose than dev

# Staging route
route:
  host: marvin-staging.apps.example.com
  annotations:
    # Add any staging-specific annotations

# Larger storage for staging
persistence:
  size: 20Gi

# Higher resource limits for staging
resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Staging secrets should come from sealed-secrets or vault
# DO NOT put real secrets here
secrets: {}

# Enable more aggressive health checks
livenessProbe:
  initialDelaySeconds: 20
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
