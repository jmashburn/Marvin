# Production environment overrides
# Usage: helm upgrade --install marvin ./marvin-chart -f values-production.yaml

# Production requires multiple replicas for availability
replicaCount: 2

# Always pull in production to ensure correct version
image:
  pullPolicy: Always

# Production configuration
config:
  production: true
  allowSignup: false  # Restrict signups in production
  logLevel: INFO  # Production logging level

  # Tighter webhook timeouts for production
  webhookTimeout: 20

# Production route with real domain
route:
  host: marvin.yourdomain.com
  # Send public traffic to the web UI. The API stays reachable on the service's `http` port
  # for the SDK/CLI and for the browser's own calls.
  targetPort: frontend
  tls:
    enabled: true
    termination: edge
  annotations:
    # Add any production-specific annotations
    # haproxy.router.openshift.io/rate-limit-connections: "true"

# Production storage requirements
persistence:
  size: 50Gi
  # storageClass: "gp3"  # Use faster storage class if available

# Production resource allocation
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Production secrets MUST come from sealed-secrets or external vault.
# NEVER put real secrets in this file. Note that `secrets: {}` does not blank the defaults —
# Helm coalesces maps, so a key omitted here keeps whatever values.yaml sets. Override each
# key explicitly (or via --set / a sealed secret) rather than relying on an empty map.
secrets: {}

# Production-grade health checks
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Anti-affinity to spread pods across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - marvin
          topologyKey: kubernetes.io/hostname
