# Default values for marvin (Development environment)
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Image configuration
image:
  repository: marvin
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

# imagePullSecrets for private registries
imagePullSecrets: []

# Override the chart name
nameOverride: ""
fullnameOverride: ""

# Deployment configuration
replicaCount: 1

# Update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Resource limits and requests
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Liveness and readiness probes
livenessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

# OpenShift Route configuration
route:
  enabled: true
  host: ""  # Auto-generated if empty
  path: /
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  annotations: {}

# Persistent storage
persistence:
  enabled: true
  # existingClaim: ""
  storageClass: ""  # Use cluster default
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Application configuration
config:
  # Environment mode
  production: false

  # Application settings
  allowSignup: true
  logLevel: DEBUG

  # Database configuration
  dbEngine: sqlite
  dataDir: /app/data

  # API configuration
  apiPort: 8080
  apiHost: "0.0.0.0"

  # Scheduler configuration
  schedulerInterval: 300  # 5 minutes in seconds

  # Webhook configuration
  webhookRetryAttempts: 3
  webhookRetryDelay: 2
  webhookTimeout: 30

# Application secrets
# In production, use sealed-secrets or external secret management
secrets:
  # SMTP Configuration
  smtpHost: "localhost"
  smtpPort: "1025"
  smtpUser: ""
  smtpPassword: ""
  smtpFromEmail: "noreply@marvin.local"

  # Security
  jwtSecret: "dev-jwt-secret-change-in-production"
  apiKey: ""

  # External services (if any)
  # Add your secrets here

# Migration job configuration
migration:
  enabled: true
  # Number of retries before considering a Job as failed
  backoffLimit: 3
  # Time to keep completed job pods for debugging
  ttlSecondsAfterFinished: 600
  # Resources for migration job
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"

# Extra environment variables
extraEnv: []
  # - name: DEBUG
  #   value: "true"

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []
