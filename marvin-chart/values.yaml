# Default values for marvin (Development environment)
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Image configuration
image:
  repository: marvin
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

# imagePullSecrets for private registries
imagePullSecrets: []

# Override the chart name
nameOverride: ""
fullnameOverride: ""

# Deployment configuration
replicaCount: 1

# Update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Resource limits and requests
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Liveness and readiness probes
livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service configuration
service:
  type: ClusterIP
  port: 8080
  # The frontend is a second port on the same pod, exposed alongside the API
  frontendPort: 4321
  # Both ports resolve to the container's named ports, so they track config.apiPort /
  # config.frontendPort automatically and can't drift out of sync with them.
  annotations: {}

# OpenShift Route configuration
route:
  enabled: true
  host: ""  # Auto-generated if empty
  path: /
  # Which service port the route sends traffic to: "http" (API) or "frontend" (web UI)
  targetPort: http
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  annotations: {}

# Persistent storage
persistence:
  enabled: true
  # existingClaim: ""
  storageClass: ""  # Use cluster default
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Application configuration
config:
  # Environment mode
  production: false

  # Application settings
  allowSignup: true
  logLevel: DEBUG

  # Database configuration
  dbEngine: sqlite
  dataDir: /app/data

  # API configuration
  apiPort: 8080
  apiHost: "0.0.0.0"

  # Server-rendered frontend (Astro SSR) — the image runs it alongside the API
  frontendPort: 4321

  # Scheduler configuration
  schedulerInterval: 300  # 5 minutes in seconds

  # Webhook configuration
  webhookRetryAttempts: 3
  webhookRetryDelay: 2
  webhookTimeout: 30

# Application secrets
# In production, use sealed-secrets or external secret management
secrets:
  # SMTP Configuration
  smtpHost: "localhost"
  smtpPort: "1025"
  smtpUser: ""
  smtpPassword: ""
  smtpFromEmail: "noreply@marvin.local"

  # Security
  # Deliberately empty: a default here is a published signing key, and `secrets: {}` in an
  # overlay would not clear it (Helm coalesces maps, so unset keys keep the parent's value).
  # Left empty, the chart reuses the key already in the cluster or generates a random one.
  jwtSecret: ""
  apiKey: ""

  # External services (if any)
  # Add your secrets here

# Pod disruption budget (only meaningful with replicaCount > 1)
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1  # mutually exclusive with minAvailable

# Extra environment variables
extraEnv: []
  # - name: DEBUG
  #   value: "true"

# Init containers, run to completion before the app container starts.
#
# The main use is installing integration plugins without rebuilding the image. Marvin discovers
# providers through the `marvin.integrations` entry-point group, which is read from installed
# distribution metadata at process start — so a plugin has to be a real installed distribution on
# sys.path before the app imports, and adding one always means a pod restart. Pair this with
# extraVolumes/extraVolumeMounts/extraEnv, as in the worked example in README.md:
#
# initContainers:
#   - name: install-plugins
#     image: python:3.12-slim
#     command: ["sh", "-c", "pip install --target /plugins marvin-integration-slack"]
#     volumeMounts:
#       - name: plugins
#         mountPath: /plugins
#
# Note that PYTHONPATH precedes site-packages, so a dependency vendored here shadows the image's
# copy. Pin deliberately, or build a derived image instead — see README.md.
initContainers: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []
