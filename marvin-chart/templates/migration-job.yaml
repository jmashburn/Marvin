{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "marvin.fullname" . }}-migration-{{ .Release.Revision }}
  labels:
    {{- include "marvin.labels" . | nindent 4 }}
    job-type: migration
  annotations:
    # Helm hooks for automatic migration during upgrade
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  {{- if .Values.migration.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "marvin.selectorLabels" . | nindent 8 }}
        job-type: migration
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "marvin.serviceAccountName" . }}
      containers:
      - name: migration
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/bash
          - -c
          - |
            set -e
            echo "========================================="
            echo "Starting Marvin Database Migration"
            echo "========================================="
            echo "Release: {{ .Release.Name }}"
            echo "Revision: {{ .Release.Revision }}"
            echo "Namespace: {{ .Release.Namespace }}"
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""

            # Change to application directory
            cd /app/src/marvin

            # Show current migration status
            echo "Current migration status:"
            alembic current || echo "No migrations applied yet"
            echo ""

            # Show pending migrations
            echo "Pending migrations:"
            alembic history | head -20
            echo ""

            # Run the migration
            echo "Running: alembic upgrade head"
            alembic upgrade head

            # Verify migration status
            echo ""
            echo "Migration complete! Current status:"
            alembic current

            echo ""
            echo "========================================="
            echo "Migration completed successfully"
            echo "========================================="
        env:
        - name: DATA_DIR
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: dataDir
        - name: DB_ENGINE
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: dbEngine
        {{- if .Values.migration.resources }}
        resources:
          {{- toYaml .Values.migration.resources | nindent 12 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: {{ .Values.config.dataDir }}
      volumes:
      - name: data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "marvin.pvcName" . }}
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
