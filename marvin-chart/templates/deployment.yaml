apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "marvin.fullname" . }}
  labels:
    {{- include "marvin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "marvin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "marvin.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "marvin.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # No command override: the image entrypoint (docker/start.sh) supervises both the API and
        # the server-rendered frontend. Overriding it here would start only one of them — and the
        # previous override called `marvin run`, which is not a console script the image installs
        # (it ships `marvin-server`), so the container exited immediately.
        ports:
        - name: http
          containerPort: {{ .Values.config.apiPort }}
          protocol: TCP
        - name: frontend
          containerPort: {{ .Values.config.frontendPort }}
          protocol: TCP
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        # Application configuration from ConfigMap
        - name: PRODUCTION
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: production
        - name: ALLOW_SIGNUP
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: allowSignup
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: logLevel
        - name: DB_ENGINE
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: dbEngine
        - name: DATA_DIR
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: dataDir
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: apiPort
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: apiHost
        - name: FRONTEND_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: frontendPort
        # Secrets from Secret
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: smtpHost
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: smtpPort
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: smtpUser
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: smtpPassword
              optional: true
        - name: SMTP_FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: smtpFromEmail
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "marvin.fullname" . }}
              key: jwtSecret
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: {{ .Values.config.dataDir }}
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      - name: data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "marvin.pvcName" . }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
