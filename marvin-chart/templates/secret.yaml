{{/*
Resolve the JWT signing key. values-production.yaml sets `secrets: {}`, so taking the value
verbatim would sign every token with an empty key in exactly the environment that can least
afford it. Fall back to the key already stored in the cluster — regenerating on each upgrade
would invalidate every issued token — and only mint a fresh one when neither exists.
*/}}
{{- $jwtSecret := .Values.secrets.jwtSecret | default "" }}
{{- if not $jwtSecret }}
{{-   $existing := lookup "v1" "Secret" .Release.Namespace (include "marvin.fullname" .) }}
{{-   if and $existing $existing.data (hasKey $existing.data "jwtSecret") }}
{{-     $jwtSecret = b64dec (index $existing.data "jwtSecret") }}
{{-   else }}
{{-     $jwtSecret = randAlphaNum 64 }}
{{-   end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "marvin.fullname" . }}
  labels:
    {{- include "marvin.labels" . | nindent 4 }}
type: Opaque
stringData:
  smtpHost: {{ .Values.secrets.smtpHost | quote }}
  smtpPort: {{ .Values.secrets.smtpPort | quote }}
  smtpUser: {{ .Values.secrets.smtpUser | default "" | quote }}
  smtpPassword: {{ .Values.secrets.smtpPassword | default "" | quote }}
  smtpFromEmail: {{ .Values.secrets.smtpFromEmail | quote }}
  jwtSecret: {{ $jwtSecret | quote }}
  {{- if .Values.secrets.apiKey }}
  apiKey: {{ .Values.secrets.apiKey | quote }}
  {{- end }}
