<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ data.subject }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased;">

  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f4f6f4;">
    <tr>
      <td align="center" style="padding: 40px 16px 32px;">

        <!-- Outer card -->
        <table border="0" cellpadding="0" cellspacing="0" width="560" style="max-width:560px; background-color:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08);">

          <!-- Top accent bar -->
          <tr>
            <td style="height:4px; background-color:#4f9c84;"></td>
          </tr>

          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px; border-bottom:1px solid #f0f0f0;">
              <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td>
                    <span style="font-size:18px; font-weight:700; color:#1a1a1a; letter-spacing:-0.3px;">{{ data.header_text }}</span>
                  </td>
                  <td align="right">
                    <span style="font-size:12px; font-weight:600; color:#4f9c84; letter-spacing:0.5px; text-transform:uppercase;">Marvin</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:28px 40px 8px; font-size:15px; line-height:1.7; color:#444444;">
              {{ data.message_top }}
            </td>
          </tr>

          <!-- CTA Button -->
          {% if data.button_link and data.button_text %}
          <tr>
            <td style="padding:24px 40px 28px;">
              <a href="{{ data.button_link }}"
                 style="display:inline-block; background-color:#4f9c84; color:#ffffff; text-decoration:none; padding:12px 24px; border-radius:8px; font-size:14px; font-weight:600; letter-spacing:0.2px;">
                {{ data.button_text }}
              </a>
            </td>
          </tr>
          {% endif %}

          <!-- Message bottom -->
          {% if data.message_bottom %}
          <tr>
            <td style="padding:0 40px 28px; font-size:13px; line-height:1.6; color:#888888;">
              {{ data.message_bottom }}
            </td>
          </tr>
          {% endif %}

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px; border-top:1px solid #f0f0f0; background-color:#fafafa;">
              <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="font-size:12px; color:#aaaaaa; line-height:1.5;">
                    Sent by <a href="{{ data.button_link }}" style="color:#4f9c84; text-decoration:none; font-weight:500;">Marvin CMS</a>
                    {% if data.workspace_name %} &middot; {{ data.workspace_name }}{% endif %}
                  </td>
                  <td align="right" style="font-size:12px; color:#cccccc;">
                    &mdash;
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
