name: Helm Validation

# Validate Helm chart quality and deployability
# Tests lint, template rendering, and deployment to Kind cluster

on:
  pull_request:
    paths:
      - 'marvin-chart/**'
      - '.github/workflows/helm.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'marvin-chart/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.14.0'

      - name: Lint Helm chart
        run: |
          helm lint marvin-chart/ --strict

      - name: Template Helm chart (default values)
        run: |
          helm template marvin marvin-chart/ \
            --debug \
            --output-dir /tmp/marvin-templates

      # `--api-versions route.openshift.io/v1` makes the OpenShift Route render: the template is
      # capability-gated so it silently vanishes from a plain `helm template`, leaving it untested.
      - name: Template Helm chart (production values)
        run: |
          helm template marvin marvin-chart/ \
            --values marvin-chart/values-production.yaml \
            --set image.tag=latest \
            --api-versions route.openshift.io/v1 \
            --debug \
            --output-dir /tmp/marvin-templates-prod

      - name: Upload rendered templates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-templates
          path: /tmp/marvin-templates*

  integration-test:
    name: Helm Integration Test (Kind)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.14.0'

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: marvin-test
          wait: 120s

      # --target production is required: the last stage in the Dockerfile is `lambda`, which resets
      # ENTRYPOINT and runs the Mangum handler, so an untargeted build produces an image that exits
      # with `"marvin.app.handler": executable file not found`. docker.yml and the Taskfile already
      # target production; this build was the odd one out.
      - name: Build Docker image for testing
        run: |
          docker build -t marvin:test -f docker/Dockerfile --target production .

      - name: Load image into Kind
        run: |
          kind load docker-image marvin:test --name marvin-test

      - name: Create test namespace
        run: |
          kubectl create namespace marvin-test

      - name: Install Helm chart
        run: |
          helm install marvin marvin-chart/ \
            --namespace marvin-test \
            --set image.repository=marvin \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --wait \
            --timeout 5m \
            --debug

      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=ready pod \
            --selector=app.kubernetes.io/name=marvin \
            --namespace marvin-test \
            --timeout=300s

      - name: Check pod status
        run: |
          kubectl get pods -n marvin-test
          kubectl get services -n marvin-test

      # The service publishes 8080 (API) and 4321 (frontend) — there has never been a port 80, so
      # the old `8080:80` forward could not connect and the `|| echo` swallowed the failure.
      - name: Test health and frontend endpoints
        run: |
          set -euo pipefail

          kubectl port-forward -n marvin-test svc/marvin 8080:8080 4321:4321 &
          trap 'kill %1 2>/dev/null || true' EXIT
          sleep 5

          echo "--- liveness ---"
          curl -fsS http://localhost:8080/healthz
          echo "--- readiness ---"
          curl -fsS http://localhost:8080/readyz
          echo "--- frontend (login renders without auth) ---"
          curl -fsS -o /dev/null http://localhost:4321/login
          echo "✅ API and frontend both serving"

      - name: Check logs on failure
        if: failure()
        run: |
          echo "=== Pod Logs ==="
          kubectl logs -n marvin-test --selector=app.kubernetes.io/name=marvin --tail=100

          echo "=== Pod Events ==="
          kubectl get events -n marvin-test --sort-by='.lastTimestamp'

          echo "=== Pod Describe ==="
          kubectl describe pods -n marvin-test

      - name: Helm test (if tests defined)
        run: |
          helm test marvin --namespace marvin-test || echo "No Helm tests defined"
        continue-on-error: true

      - name: Uninstall Helm chart
        if: always()
        run: |
          helm uninstall marvin --namespace marvin-test || true

      - name: Delete test namespace
        if: always()
        run: |
          kubectl delete namespace marvin-test || true

  security-scan:
    name: Helm Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run Checkov scan on Helm templates
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: marvin-chart/
          framework: helm
          output_format: cli
          soft_fail: true
        continue-on-error: true

  package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs:
      - lint
      - integration-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.14.0'

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package marvin-chart/ --destination .helm-packages/

      - name: Upload Helm package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart-package
          path: .helm-packages/*.tgz
