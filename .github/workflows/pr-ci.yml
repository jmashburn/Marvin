name: PR CI

# Fast validation for pull requests
# Runs linting, formatting, type checking, and quick builds
# Designed to fail fast and provide immediate feedback

on:
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Job 1: Python Linting and Formatting
  python-quality:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Cache Python dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run Ruff (lint)
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

      - name: Run Ruff (format check)
        run: |
          source .venv/bin/activate
          ruff format --check src/ tests/

      - name: Run mypy
        run: |
          source .venv/bin/activate
          mypy src/marvin/ || true  # Currently non-blocking
        continue-on-error: true

  # Job 2: Quick Python Tests
  python-quick-tests:
    name: Python Quick Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Cache Python dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run quick tests (no database)
        run: |
          source .venv/bin/activate
          pytest tests/ -m "not integration" -x --tb=short || true
        continue-on-error: true

  # Job 3: OpenAPI Validation
  openapi-validation:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Generate OpenAPI spec
        run: |
          source .venv/bin/activate
          python -c "
          from marvin.app import app
          import json
          spec = app.openapi()
          with open('openapi.json', 'w') as f:
              json.dump(spec, f, indent=2)
          "

      - name: Validate OpenAPI spec
        run: |
          # Check that spec was generated successfully
          test -f openapi.json
          # Basic validation: check it's valid JSON
          python -m json.tool openapi.json > /dev/null

  # Job 4: SDK Build
  sdk-build:
    name: SDK Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ~/Code/marvin-sdk
    steps:
      - name: Checkout main repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: marvin

      - name: Checkout SDK repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: InnerOpen/marvin-sdk
          path: marvin-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marvin-sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: marvin-sdk
        run: npm ci

      - name: Lint SDK
        working-directory: marvin-sdk
        run: npm run lint || true
        continue-on-error: true

      - name: Build SDK
        working-directory: marvin-sdk
        run: npm run build

      - name: Type check SDK
        working-directory: marvin-sdk
        run: npm run type-check || npx tsc --noEmit || true
        continue-on-error: true

  # Job 5: CLI Build
  cli-build:
    name: CLI Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: marvin

      - name: Checkout CLI repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: InnerOpen/marvin-cli
          path: marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marvin-cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: marvin-cli
        run: npm ci

      - name: Lint CLI
        working-directory: marvin-cli
        run: npm run lint || true
        continue-on-error: true

      - name: Build CLI
        working-directory: marvin-cli
        run: npm run build

      - name: Type check CLI
        working-directory: marvin-cli
        run: npm run type-check || npx tsc --noEmit || true
        continue-on-error: true

  # Job 6: Helm Lint
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.14.0'

      - name: Lint Helm chart
        run: helm lint marvin-chart/

      - name: Template Helm chart
        run: helm template marvin marvin-chart/ --debug

  # Job 7: Frontend Lint, Type Check & Build
  frontend-quality:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (Biome)
        working-directory: frontend
        run: npm run lint || true  # Advisory: Biome flags false unused-vars on .astro templates
        continue-on-error: true

      - name: Type check (astro check)
        working-directory: frontend
        run: npm run check
        continue-on-error: true  # Non-blocking for now: pre-existing type errors to burn down

      - name: Build
        working-directory: frontend
        run: npx astro build  # Blocking: real build/bundle gate (astro strips types, unaffected by check)

  # Job 8: Summary
  pr-ci-summary:
    name: PR CI Summary
    runs-on: ubuntu-latest
    needs:
      - python-quality
      - python-quick-tests
      - openapi-validation
      - sdk-build
      - cli-build
      - helm-lint
      - frontend-quality
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.python-quality.result }}" != "success" ]]; then
            echo "❌ Python quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.openapi-validation.result }}" != "success" ]]; then
            echo "❌ OpenAPI validation failed"
            exit 1
          fi
          if [[ "${{ needs.sdk-build.result }}" != "success" ]]; then
            echo "❌ SDK build failed"
            exit 1
          fi
          if [[ "${{ needs.cli-build.result }}" != "success" ]]; then
            echo "❌ CLI build failed"
            exit 1
          fi
          if [[ "${{ needs.helm-lint.result }}" != "success" ]]; then
            echo "❌ Helm lint failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-quality.result }}" != "success" ]]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          echo "✅ All PR CI checks passed!"
