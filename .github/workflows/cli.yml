name: CLI Integration Tests

# End-to-end CLI testing against real Marvin backend

on:
  pull_request:
    paths:
      - 'src/marvin/**'
      - '.github/workflows/cli.yml'
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cli-e2e-tests:
    name: CLI End-to-End Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: marvin
          POSTGRES_PASSWORD: marvin
          POSTGRES_DB: marvin_cli_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://marvin:marvin@localhost:5432/marvin_cli_test
      REDIS_URL: redis://localhost:6379/0
      MARVIN_API_URL: http://localhost:8080

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: marvin

      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-cli
          # Without a ref this builds the CLI's default branch (main) while backend work lands on
          # develop, so the job silently tested a lagging CLI. Track develop to catch drift.
          ref: develop
          path: marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marvin-cli/package-lock.json

      - name: Install system dependencies (OpenLDAP headers for python-ldap)
        run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev

      - name: Install Marvin backend dependencies
        working-directory: marvin
        run: |
          pip install -e ".[dev]"

      # The SQLite file lives in <BASE_DIR>/dev/data, and BASE_DIR resolves to the repo's src/
      # directory. Nothing under src/dev/data is tracked, so a fresh checkout doesn't have it, and
      # the code that creates it (AppDirectories) only runs when the app starts — one step below.
      # Without this, alembic fails with "unable to open database file".
      - name: Create SQLite data directory
        working-directory: marvin
        run: mkdir -p src/dev/data

      - name: Run Alembic migrations
        working-directory: marvin/src/marvin
        run: |
          alembic upgrade head

      # The backend seeds its default admin on first startup. Without a known password it
      # auto-generates a random one we can't recover, so pin a throwaway credential for this
      # run only — it exists just long enough to mint the CLI's token in the next step.
      - name: Generate throwaway admin credentials
        run: |
          PW="$(openssl rand -hex 32)"
          echo "::add-mask::$PW"
          echo "DEFAULT_EMAIL=ci-admin@marvin.test" >> "$GITHUB_ENV"
          echo "DEFAULT_PASSWORD=$PW" >> "$GITHUB_ENV"

      - name: Start Marvin backend
        working-directory: marvin
        run: |
          nohup uvicorn marvin.app:app --host 0.0.0.0 --port 8080 > /tmp/marvin.log 2>&1 &
          echo $! > /tmp/marvin.pid

          # Wait for server to start
          for i in {1..30}; do
            # /health and /healthz do not exist — the real endpoint is /api/app/health. Probing
            # the wrong paths meant this loop never succeeded and simply burned 60s, letting the
            # suite run against a backend that might not be up yet.
            if curl -fsS http://localhost:8080/api/app/health >/dev/null 2>&1; then
              echo "✅ Marvin backend started"
              break
            fi
            echo "Waiting for Marvin backend... ($i/30)"
            sleep 2
          done

      # Unauthenticated, the CLI only registers the auth commands — `marvin workspace …` doesn't
      # exist yet, so the suite fails with "unknown command 'create'". The CLI reads
      # MARVIN_USER_TOKEN, so mint one and hand it over; the password is not needed again.
      - name: Mint CLI access token
        run: |
          TOKEN=$(curl -sS -X POST "$MARVIN_API_URL/api/auth/token" \
            --data-urlencode "username=$DEFAULT_EMAIL" \
            --data-urlencode "password=$DEFAULT_PASSWORD" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          if [ -z "$TOKEN" ]; then
            echo "::error::Could not obtain an access token — backend log follows"
            cat /tmp/marvin.log
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "MARVIN_USER_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "✅ CLI authenticated"

      - name: Install CLI dependencies
        working-directory: marvin-cli
        run: npm ci

      - name: Build CLI
        working-directory: marvin-cli
        run: npm run build

      - name: Link CLI for testing
        working-directory: marvin-cli
        run: npm link

      - name: CLI Test Suite
        run: |
          set -euo pipefail

          echo "=== CLI Integration Test Suite ==="
          TMP="$(mktemp -d)"
          # Unique per run so names/slugs never collide with a previous run's leftovers.
          U="${GITHUB_RUN_ID:-$RANDOM}"

          # Commands print a human "✓ ..." line to stdout before the JSON body, so slice from the
          # first bracket. Payloads go via --file, not the local `--json <payload>` option, which
          # would collide with the global --json output shortcut used here; `--file -` (stdin) is
          # not honoured by the platform commands either.
          json_of() { sed -n '/^[[{]/,$p'; }

          echo "📝 Test: Display help"
          marvin --help

          echo "📝 Test: Create workspace"
          echo "{\"name\":\"CI Test Workspace $U\"}" > "$TMP/ws.json"
          WS=$(marvin admin groups create --file "$TMP/ws.json" --json | json_of)
          WS_ID=$(echo "$WS" | jq -r '.id')
          WS_SLUG=$(echo "$WS" | jq -r '.slug')
          echo "✅ Workspace created: $WS_SLUG ($WS_ID)"

          echo "📝 Test: List workspaces"
          marvin admin groups list --json >/dev/null
          echo "✅ Workspaces listed"

          echo "📝 Test: Select workspace and read it back"
          marvin workspace use "$WS_SLUG" >/dev/null
          marvin workspace current --json | json_of | jq -e --arg s "$WS_SLUG" '.slug == $s' >/dev/null
          echo "✅ Active workspace is $WS_SLUG"

          echo "📝 Test: Create collection"
          echo "{\"name\":\"CI Collection $U\",\"targetType\":\"entry\",\"isPublic\":false,\"sortOrder\":0,\"isSmart\":false}" > "$TMP/col.json"
          COLLECTION_ID=$(marvin platform collections create --file "$TMP/col.json" --workspace "$WS_SLUG" --json | json_of | jq -r '.id')
          echo "✅ Collection created: $COLLECTION_ID"

          echo "📝 Test: Create entry type"
          echo "{\"name\":\"CI Entry Type $U\",\"slug\":\"ci-entry-type-$U\",\"schemaJson\":{\"fields\":[]}}" > "$TMP/et.json"
          ENTRY_TYPE_ID=$(marvin platform entry-types create --file "$TMP/et.json" --workspace "$WS_SLUG" --json | json_of | jq -r '.id')
          echo "✅ Entry type created: $ENTRY_TYPE_ID"

          echo "📝 Test: Create entry"
          echo "{\"title\":\"CI Entry\",\"slug\":\"ci-entry-$U\",\"entryTypeId\":\"$ENTRY_TYPE_ID\",\"status\":\"draft\"}" > "$TMP/entry.json"
          ENTRY_ID=$(marvin platform entries create --file "$TMP/entry.json" --workspace "$WS_SLUG" --json | json_of | jq -r '.id')
          echo "✅ Entry created: $ENTRY_ID"

          echo "📝 Test: Get entry"
          marvin platform entries get "$ENTRY_ID" --workspace "$WS_SLUG" --json | json_of | jq -e '.title == "CI Entry"' >/dev/null
          echo "✅ Entry retrieved"

          echo "📝 Test: Update entry"
          echo '{"title":"CI Entry Updated"}' > "$TMP/update.json"
          marvin platform entries update "$ENTRY_ID" --file "$TMP/update.json" --workspace "$WS_SLUG" --json | json_of | jq -e '.title == "CI Entry Updated"' >/dev/null
          echo "✅ Entry updated"

          echo "📝 Test: Add entry to collection"
          marvin platform entries add-to-collection "$ENTRY_ID" "$COLLECTION_ID" --workspace "$WS_SLUG" >/dev/null
          echo "✅ Entry added to collection"

          echo "📝 Test: Delete entry"
          marvin platform entries delete "$ENTRY_ID" --yes --workspace "$WS_SLUG" >/dev/null
          echo "✅ Entry deleted"

          echo "📝 Test: Delete collection"
          marvin platform collections delete "$COLLECTION_ID" --yes --workspace "$WS_SLUG" >/dev/null
          echo "✅ Collection deleted"

          # NOTE: no "delete workspace" step. `DELETE /api/admin/groups/{id}?force=true` is broken —
          # force only skips the safety checks, it does not cascade, so the delete then fails on a
          # foreign-key constraint. The throwaway workspace is left behind (harmless on a CI database).

          echo "=== All CLI integration tests passed ==="

      - name: Check Marvin logs on failure
        if: failure()
        run: |
          echo "=== Marvin Backend Logs ==="
          cat /tmp/marvin.log || echo "No logs available"

      - name: Stop Marvin backend
        if: always()
        run: |
          if [ -f /tmp/marvin.pid ]; then
            kill $(cat /tmp/marvin.pid) || true
          fi

  cli-build-matrix:
    name: CLI Build (Multi-platform)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['22']

    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Test CLI import
        run: node -e "require('./dist/index.js')" || echo "⚠️ CLI entry point not found"
        continue-on-error: true

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-node${{ matrix.node-version }}
          path: dist/
