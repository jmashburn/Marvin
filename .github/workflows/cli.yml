name: CLI Integration Tests

# End-to-end CLI testing against real Marvin backend

on:
  pull_request:
    paths:
      - 'src/marvin/**'
      - '.github/workflows/cli.yml'
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cli-e2e-tests:
    name: CLI End-to-End Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: marvin
          POSTGRES_PASSWORD: marvin
          POSTGRES_DB: marvin_cli_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://marvin:marvin@localhost:5432/marvin_cli_test
      REDIS_URL: redis://localhost:6379/0
      MARVIN_API_URL: http://localhost:8080

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: marvin

      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-cli
          path: marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marvin-cli/package-lock.json

      - name: Install system dependencies (OpenLDAP headers for python-ldap)
        run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev

      - name: Install Marvin backend dependencies
        working-directory: marvin
        run: |
          pip install -e ".[dev]"

      # The SQLite file lives in <BASE_DIR>/dev/data, and BASE_DIR resolves to the repo's src/
      # directory. Nothing under src/dev/data is tracked, so a fresh checkout doesn't have it, and
      # the code that creates it (AppDirectories) only runs when the app starts — one step below.
      # Without this, alembic fails with "unable to open database file".
      - name: Create SQLite data directory
        working-directory: marvin
        run: mkdir -p src/dev/data

      - name: Run Alembic migrations
        working-directory: marvin/src/marvin
        run: |
          alembic upgrade head

      # The backend seeds its default admin on first startup. Without a known password it
      # auto-generates a random one we can't recover, so pin a throwaway credential for this
      # run only — it exists just long enough to mint the CLI's token in the next step.
      - name: Generate throwaway admin credentials
        run: |
          PW="$(openssl rand -hex 32)"
          echo "::add-mask::$PW"
          echo "DEFAULT_EMAIL=ci-admin@marvin.test" >> "$GITHUB_ENV"
          echo "DEFAULT_PASSWORD=$PW" >> "$GITHUB_ENV"

      - name: Start Marvin backend
        working-directory: marvin
        run: |
          nohup uvicorn marvin.app:app --host 0.0.0.0 --port 8080 > /tmp/marvin.log 2>&1 &
          echo $! > /tmp/marvin.pid

          # Wait for server to start
          for i in {1..30}; do
            # /health and /healthz do not exist — the real endpoint is /api/app/health. Probing
            # the wrong paths meant this loop never succeeded and simply burned 60s, letting the
            # suite run against a backend that might not be up yet.
            if curl -fsS http://localhost:8080/api/app/health >/dev/null 2>&1; then
              echo "✅ Marvin backend started"
              break
            fi
            echo "Waiting for Marvin backend... ($i/30)"
            sleep 2
          done

      # Unauthenticated, the CLI only registers the auth commands — `marvin workspace …` doesn't
      # exist yet, so the suite fails with "unknown command 'create'". The CLI reads
      # MARVIN_USER_TOKEN, so mint one and hand it over; the password is not needed again.
      - name: Mint CLI access token
        run: |
          TOKEN=$(curl -sS -X POST "$MARVIN_API_URL/api/auth/token" \
            --data-urlencode "username=$DEFAULT_EMAIL" \
            --data-urlencode "password=$DEFAULT_PASSWORD" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          if [ -z "$TOKEN" ]; then
            echo "::error::Could not obtain an access token — backend log follows"
            cat /tmp/marvin.log
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "MARVIN_USER_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "✅ CLI authenticated"

      - name: Install CLI dependencies
        working-directory: marvin-cli
        run: npm ci

      - name: Build CLI
        working-directory: marvin-cli
        run: npm run build

      - name: Link CLI for testing
        working-directory: marvin-cli
        run: npm link

      - name: CLI Test Suite
        run: |
          set -e

          echo "=== CLI Integration Test Suite ==="

          # Test: Display help
          echo "📝 Test: Display help"
          marvin --help || marvin help || true

          # Test: Create workspace
          echo "📝 Test: Create workspace"
          WORKSPACE_OUTPUT=$(marvin workspace create test-workspace --description "Test workspace" --format json)
          WORKSPACE_ID=$(echo "$WORKSPACE_OUTPUT" | jq -r '.id')
          echo "✅ Workspace created: $WORKSPACE_ID"

          # Test: List workspaces
          echo "📝 Test: List workspaces"
          marvin workspace list --format json
          echo "✅ Workspaces listed"

          # Test: Get workspace
          echo "📝 Test: Get workspace"
          marvin workspace get "$WORKSPACE_ID" --format json
          echo "✅ Workspace retrieved"

          # Test: Create collection
          echo "📝 Test: Create collection"
          COLLECTION_OUTPUT=$(marvin collection create test-collection \
            --workspace "$WORKSPACE_ID" \
            --description "Test collection" \
            --format json)
          COLLECTION_ID=$(echo "$COLLECTION_OUTPUT" | jq -r '.id')
          echo "✅ Collection created: $COLLECTION_ID"

          # Test: Create entry type
          echo "📝 Test: Create entry type"
          ENTRY_TYPE_OUTPUT=$(marvin entry-type create test-entry-type \
            --workspace "$WORKSPACE_ID" \
            --collection "$COLLECTION_ID" \
            --format json)
          ENTRY_TYPE_ID=$(echo "$ENTRY_TYPE_OUTPUT" | jq -r '.id')
          echo "✅ Entry type created: $ENTRY_TYPE_ID"

          # Test: Create entry
          echo "📝 Test: Create entry"
          ENTRY_OUTPUT=$(marvin entry create test-entry \
            --workspace "$WORKSPACE_ID" \
            --collection "$COLLECTION_ID" \
            --entry-type "$ENTRY_TYPE_ID" \
            --format json)
          ENTRY_ID=$(echo "$ENTRY_OUTPUT" | jq -r '.id')
          echo "✅ Entry created: $ENTRY_ID"

          # Test: Get entry
          echo "📝 Test: Get entry"
          marvin entry get "$ENTRY_ID" --format json
          echo "✅ Entry retrieved"

          # Test: Update entry
          echo "📝 Test: Update entry"
          marvin entry update "$ENTRY_ID" \
            --title "Updated Test Entry" \
            --format json
          echo "✅ Entry updated"

          # Test: Publish entry
          echo "📝 Test: Publish entry"
          marvin publish entry "$ENTRY_ID" --format json || echo "⚠️ Publish not yet implemented"

          # Test: Delete entry
          echo "📝 Test: Delete entry"
          marvin entry delete "$ENTRY_ID" --confirm --format json
          echo "✅ Entry deleted"

          # Test: Delete collection
          echo "📝 Test: Delete collection"
          marvin collection delete "$COLLECTION_ID" --confirm --format json
          echo "✅ Collection deleted"

          # Test: Delete workspace
          echo "📝 Test: Delete workspace"
          marvin workspace delete "$WORKSPACE_ID" --confirm --format json
          echo "✅ Workspace deleted"

          echo ""
          echo "🎉 All CLI tests passed!"

      - name: Check Marvin logs on failure
        if: failure()
        run: |
          echo "=== Marvin Backend Logs ==="
          cat /tmp/marvin.log || echo "No logs available"

      - name: Stop Marvin backend
        if: always()
        run: |
          if [ -f /tmp/marvin.pid ]; then
            kill $(cat /tmp/marvin.pid) || true
          fi

  cli-build-matrix:
    name: CLI Build (Multi-platform)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['22']

    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Test CLI import
        run: node -e "require('./dist/index.js')" || echo "⚠️ CLI entry point not found"
        continue-on-error: true

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-node${{ matrix.node-version }}
          path: dist/
