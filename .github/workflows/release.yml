name: Release

# Automated semantic versioning and release workflow
# Analyzes commits, bumps version, generates changelog, creates releases

on:
  push:
    branches:
      - main
      - develop
  # Manual trigger. Without this the workflow can only be exercised by landing a commit on a
  # release branch, so a change to it cannot be validated before merge — and a push whose commit
  # message carries the CI-skip marker leaves no way to run it at all.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel releases

permissions:
  contents: write      # Create tags, update files, create releases
  issues: write        # Comment on issues
  pull-requests: write # Comment on PRs
  packages: write      # Publish to GHCR
  id-token: write      # OIDC token

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      # uv is needed by semantic-release's build_command, which runs `uv lock` so the refreshed
      # lockfile is committed alongside the version bump (see [tool.semantic_release] in
      # pyproject.toml). Without uv on PATH the build_command fails and no release is cut.
      - name: Install Python Semantic Release
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release uv

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Semantic Release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # semantic-release populates $GITHUB_OUTPUT itself — released, version, tag, is_prerelease,
        # link, previous_version, commit_sha, release_notes — so this step needs no detection logic
        # of its own. It previously ran `version --print` and grepped a version out of the result,
        # which reported a release on every push: with nothing to release, --print still writes the
        # *current* version to stdout and explains itself on stderr ("No release will be made, X has
        # already been released!"). Nothing published spuriously only because the real
        # `semantic-release version` call ran afterwards and overwrote `released` with the correct
        # value, last write winning. Reading semantic-release's own output removes that coincidence,
        # and drops a redundant second invocation with it.
        #
        # Exits 0 when no release is due, so an ordinary commit does not fail the job.
        run: semantic-release version

      # Attaches build artifacts to the GitHub release, so it is only meaningful once one exists.
      - name: Publish release assets
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      - name: Upload version info
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: version-info
          path: |
            CHANGELOG.md
            pyproject.toml

  # Build and publish Docker image if release was created
  docker-release:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT=${{ github.sha }}

  # Package and publish Helm chart if release was created
  helm-release:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.14.0'

      - name: Update Helm chart version
        run: |
          VERSION=${{ needs.release.outputs.version }}
          sed -i "s/^version:.*/version: $VERSION/" marvin-chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" marvin-chart/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package marvin-chart/ --destination .helm-packages/

      - name: Upload Helm package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: .helm-packages/*.tgz

      - name: Publish Helm chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHART_FILE=$(ls .helm-packages/*.tgz)
          gh release upload v${{ needs.release.outputs.version }} "$CHART_FILE" --clobber

  # Release summary
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - release
      - docker-release
      - helm-release
    if: always() && needs.release.outputs.released == 'true'
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Release v${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts Published:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Helm Chart: \`marvin-${{ needs.release.outputs.version }}.tgz\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** SDK and CLI are published independently from their respective repositories." >> $GITHUB_STEP_SUMMARY
