name: Release

# Automated semantic versioning and release workflow
# Analyzes commits, bumps version, generates changelog, creates releases

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel releases

permissions:
  contents: write      # Create tags, update files, create releases
  issues: write        # Comment on issues
  pull-requests: write # Comment on PRs
  packages: write      # Publish to GHCR
  id-token: write      # OIDC token

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Semantic Release
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Semantic Release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run semantic-release to determine next version
          semantic-release version --print > version_info.txt || true

          # Check if a new version was created
          if [ -f "version_info.txt" ] && [ -s "version_info.txt" ]; then
            NEW_VERSION=$(cat version_info.txt | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?')
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
            echo "📦 New version: $NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No release needed"
          fi

          # Actually create the release
          semantic-release version
          semantic-release publish

      - name: Upload version info
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: |
            CHANGELOG.md
            pyproject.toml

  # Build and publish Docker image if release was created
  docker-release:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT=${{ github.sha }}

  # Package and publish Helm chart if release was created
  helm-release:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Update Helm chart version
        run: |
          VERSION=${{ needs.release.outputs.version }}
          sed -i "s/^version:.*/version: $VERSION/" marvin-chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" marvin-chart/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package marvin-chart/ --destination .helm-packages/

      - name: Upload Helm package
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-packages/*.tgz

      - name: Publish Helm chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHART_FILE=$(ls .helm-packages/*.tgz)
          gh release upload v${{ needs.release.outputs.version }} "$CHART_FILE" --clobber

  # Release summary
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - release
      - docker-release
      - helm-release
    if: always() && needs.release.outputs.released == 'true'
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Release v${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts Published:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Helm Chart: \`marvin-${{ needs.release.outputs.version }}.tgz\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** SDK and CLI are published independently from their respective repositories." >> $GITHUB_STEP_SUMMARY
