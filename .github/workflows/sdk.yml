name: SDK Quality Gate

# Protect SDK quality - ensure generated SDK is up-to-date with OpenAPI

on:
  pull_request:
    paths:
      - 'src/marvin/api/**'
      - 'src/marvin/routes/**'
      - '.github/workflows/sdk.yml'
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # For commenting on PRs

jobs:
  verify-sdk:
    name: Verify SDK is Up-to-Date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: marvin

      - name: Checkout SDK repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-sdk
          path: marvin-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marvin-sdk/package-lock.json

      - name: Install Python dependencies
        working-directory: marvin
        run: |
          pip install -e ".[dev]"

      - name: Generate OpenAPI spec from Marvin
        working-directory: marvin
        run: |
          python -c "
          from marvin.app import app
          import json
          spec = app.openapi()
          with open('../marvin-sdk/openapi.json', 'w') as f:
              json.dump(spec, f, indent=2)
          print('✅ OpenAPI spec generated')
          "

      - name: Install SDK dependencies
        working-directory: marvin-sdk
        run: npm ci

      - name: Regenerate SDK from new OpenAPI spec
        working-directory: marvin-sdk
        run: |
          npm run generate || echo "⚠️ SDK generation failed"

      - name: Check for SDK changes
        id: check-changes
        working-directory: marvin-sdk
        run: |
          git diff --exit-code src/ || {
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "❌ SDK is out of sync with OpenAPI spec!"
            exit 1
          }
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "✅ SDK is up-to-date"

      - name: Comment on PR if SDK needs updating
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ⚠️ SDK Out of Sync\n\nThe OpenAPI spec has changed but the SDK was not regenerated.\n\n**To fix:**\n```bash\ncd ~/Code/marvin-sdk\nnpm run generate\ngit add src/\ngit commit -m "chore: regenerate SDK from updated OpenAPI spec"\ngit push\n```'
            })

  build-and-test:
    name: Build & Test SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint SDK
        run: npm run lint

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Run tests
        run: npm test || echo "⚠️ Tests not yet configured"
        continue-on-error: true

      - name: Build SDK
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Bundle size: $BUNDLE_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload SDK bundle
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: dist/

  type-coverage:
    name: Type Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check type coverage
        run: |
          npx type-coverage --detail || echo "⚠️ Type coverage tool not configured"
        continue-on-error: true
