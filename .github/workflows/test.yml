name: Test Suite

# Comprehensive testing with real services (PostgreSQL, Redis)
# Tests backend, SDK, CLI with full integration

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write  # For test reporting

jobs:
  # Job 1: Backend Tests with Database
  backend-tests:
    name: Backend Tests (PostgreSQL + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: marvin
          POSTGRES_PASSWORD: marvin
          POSTGRES_DB: marvin_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://marvin:marvin@localhost:5432/marvin_test
      REDIS_URL: redis://localhost:6379/0
      TESTING: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-test-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-test-
            ${{ runner.os }}-python-

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U marvin; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Wait for Redis
        run: |
          until redis-cli -h localhost -p 6379 ping; do
            echo "Waiting for Redis..."
            sleep 2
          done

      - name: Run Alembic upgrade
        run: |
          source .venv/bin/activate
          cd src/marvin
          alembic upgrade head

      - name: Test Alembic downgrade
        run: |
          source .venv/bin/activate
          cd src/marvin
          alembic downgrade base

      - name: Re-run Alembic upgrade (verify reversibility)
        run: |
          source .venv/bin/activate
          cd src/marvin
          alembic upgrade head

      - name: Run pytest with coverage
        run: |
          source .venv/bin/activate
          pytest tests/ \
            --cov=src/marvin \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junitxml=junit.xml \
            -v

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junit.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit.xml
          check_name: Backend Test Results

  # Job 2: SDK Tests
  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SDK tests
        run: npm test || true
        continue-on-error: true

      - name: Build SDK
        run: npm run build

      - name: Upload SDK bundle
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: dist/

  # Job 3: CLI Tests
  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CLI tests
        run: npm test || true
        continue-on-error: true

      - name: Build CLI
        run: npm run build

      - name: Upload CLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle
          path: dist/

  # Job 4: Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - sdk-tests
      - cli-tests
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Check results
        run: |
          echo "📊 Test Summary"
          echo "==============="
          echo ""
          echo "Backend: ${{ needs.backend-tests.result }}"
          echo "SDK: ${{ needs.sdk-tests.result }}"
          echo "CLI: ${{ needs.cli-tests.result }}"
          echo ""

          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi

          echo "✅ All critical tests passed!"
