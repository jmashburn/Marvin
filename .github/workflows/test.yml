name: Test Suite

# Backend suite on SQLite (fast primary gate) + PostgreSQL compatibility (real driver +
# service container, migration reversibility, full suite on PG), plus SDK/CLI builds.

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write # For test reporting

jobs:
  # Job 1: Backend suite on SQLite — the primary gate. No services, fast.
  backend-tests:
    name: Backend Tests (SQLite)
    runs-on: ubuntu-latest
    env:
      TESTING: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pytest with coverage
        run: |
          uv run pytest tests/ \
            --cov=src/marvin \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=junit.xml \
            -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit.xml
          check_name: Backend Test Results (SQLite)

  # Job 2: PostgreSQL compatibility — real driver (psycopg2) + service container, migration
  # reversibility (up → down → up), and the full suite run against PostgreSQL.
  postgres-tests:
    name: Backend Tests (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marvin
          POSTGRES_PASSWORD: marvin
          POSTGRES_DB: marvin_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      TESTING: "true"
      DB_ENGINE: postgres
      POSTGRES_USER: marvin
      POSTGRES_PASSWORD: marvin
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: marvin_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (+ postgres driver)
        run: uv sync --group postgres

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U marvin; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Migration reversibility (up -> down -> up)
        working-directory: src/marvin
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Run pytest on PostgreSQL
        run: uv run pytest tests/ -q

  # Job 3: Vault secrets — real Vault dev service, SECRET_BACKEND=vault. Runs the vault-gated
  # secret/resolver tests (they skip in the SQLite/Postgres jobs). DB stays SQLite here.
  vault-tests:
    name: Backend Tests (Vault secrets)
    runs-on: ubuntu-latest

    services:
      vault:
        image: hashicorp/vault:latest
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: roottoken
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        options: --cap-add=IPC_LOCK

    env:
      TESTING: "true"
      SECRET_BACKEND: vault
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: roottoken
      VAULT_MOUNT: secret
      VAULT_PATH_PREFIX: marvintest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Wait for Vault
        run: |
          until curl -sf http://localhost:8200/v1/sys/health; do
            echo "Waiting for Vault..."
            sleep 2
          done

      - name: Install dependencies (+ vault client)
        run: uv sync --group vault

      - name: Run Vault secret + resolver tests
        run: uv run pytest tests/test_secrets_vault.py -q

  # Job 4: SDK build/test (separate repo)
  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run SDK tests
        run: npm test || true
        continue-on-error: true

      - name: Build SDK
        run: npm run build

      - name: Upload SDK bundle
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: dist/

  # Job 4: CLI build/test (separate repo)
  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: InnerOpen/marvin-cli
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CLI tests
        run: npm test || true
        continue-on-error: true

      - name: Build CLI
        run: npm run build

      - name: Upload CLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle
          path: dist/

  # Job 5: Test Summary — gates on the backend suites (SQLite + PostgreSQL).
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - postgres-tests
      - vault-tests
      - sdk-tests
      - cli-tests
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Test Summary"
          echo "==============="
          echo "Backend (SQLite):     ${{ needs.backend-tests.result }}"
          echo "Backend (PostgreSQL): ${{ needs.postgres-tests.result }}"
          echo "Backend (Vault):      ${{ needs.vault-tests.result }}"
          echo "SDK:                  ${{ needs.sdk-tests.result }}"
          echo "CLI:                  ${{ needs.cli-tests.result }}"
          echo ""
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend (SQLite) tests failed"; exit 1
          fi
          if [[ "${{ needs.postgres-tests.result }}" != "success" ]]; then
            echo "Backend (PostgreSQL) tests failed"; exit 1
          fi
          if [[ "${{ needs.vault-tests.result }}" != "success" ]]; then
            echo "Backend (Vault) tests failed"; exit 1
          fi
          echo "All critical tests passed"
